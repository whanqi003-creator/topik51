<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPIK 51题 复习站</title>
    <style>
        body { font-family: 'PingFang SC', sans-serif; background-color: #f5f7fa; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 650px; }
        h2 { color: #1a3a5f; border-left: 5px solid #3498db; padding-left: 10px; }
        .text-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; font-size: 18px; line-height: 1.8; margin-bottom: 20px; white-space: pre-wrap; }
        
        /* 双输入框样式 */
        .input-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .input-row { display: flex; align-items: center; gap: 10px; }
        .input-label { font-size: 18px; font-weight: bold; color: #e74c3c; min-width: 25px; }
        .user-input { flex: 1; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 16px; outline: none; transition: 0.2s; }
        .user-input:focus { border-color: #3498db; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-hint { flex: 1; background: #e2e8f0; color: #475569; }
        .btn-answer { flex: 1; background: #3498db; color: white; }
        .btn-next { flex: 1; background: #2ecc71; color: white; }
        .info-panel { padding: 15px; border-radius: 8px; display: none; font-size: 15px; line-height: 1.6; margin-top: 10px; }
        .hint-box { background: #fffbeb; border: 1px solid #fef3c7; color: #b45309; white-space: pre-wrap; }
        .answer-box { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; font-size: 18px; font-weight: bold; white-space: pre-wrap; }
    </style>
</head>
<body>
<div class="card">
    <h2 id="q-title">题目加载中...</h2>
    <div class="text-box" id="text-content"></div>

    <div class="input-container">
        <div class="input-row">
            <span class="input-label">㉠</span>
            <input type="text" id="user-ans-a" class="user-input" placeholder="请输入 ㉠ 的韩语答案...">
        </div>
        <div class="input-row">
            <span class="input-label">㉡</span>
            <input type="text" id="user-ans-b" class="user-input" placeholder="请输入 ㉡ 的韩语答案...">
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-hint" onclick="showHint()">💡 查看前后文线索</button>
        <button class="btn-answer" onclick="showAnswer()">✅ 核对标准答案</button>
        <button class="btn-next" onclick="nextQuestion()">下一题 ➡️</button>
    </div>
    <div id="hint-panel" class="info-panel hint-box"></div>
    <div id="answer-panel" class="info-panel answer-box"></div>
</div>
<script src="script.js"></script>
</body>
</html>
