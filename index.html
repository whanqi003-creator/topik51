<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPIK 51题 复习站</title>
    <style>
        body { font-family: 'PingFang SC', sans-serif; background-color: #f5f7fa; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 650px; }
        h2 { color: #1a3a5f; border-left: 5px solid #3498db; padding-left: 10px; }
        .text-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; font-size: 18px; line-height: 1.8; margin-bottom: 20px; }
        .blank { color: #e74c3c; font-weight: bold; text-decoration: underline; background: #fef2f2; padding: 2px 6px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-hint { background: #e2e8f0; color: #475569; }
        .btn-answer { background: #3498db; color: white; }
        .btn-next { background: #2ecc71; color: white; }
        .info-panel { padding: 15px; border-radius: 8px; display: none; font-size: 15px; line-height: 1.6; margin-top: 10px; }
        .hint-box { background: #fffbeb; border: 1px solid #fef3c7; color: #b45309; }
        .answer-box { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2 id="q-title">题目加载中...</h2>
    <div class="text-box">
        <span id="text-before"></span>
        <span class="blank" id="text-blank">( ㉠ )</span>
        <span id="text-after"></span>
    </div>
    <div class="btn-group">
        <button class="btn-hint" onclick="showHint()">💡 查看前后文线索</button>
        <button class="btn-answer" onclick="showAnswer()">✅ 核对标准答案</button>
        <button class="btn-next" onclick="nextQuestion()">下一题 ➡️</button>
    </div>
    <div id="hint-panel" class="info-panel hint-box"></div>
    <div id="answer-panel" class="info-panel answer-box"></div>
</div>
<script src="script.js"></script>
</body>
</html>
